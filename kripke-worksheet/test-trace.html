<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MPL Trace Test</title>
  <style>
    body {
      font-family: monospace;
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .test-section {
      background: white;
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 5px;
    }
    h2 {
      margin-top: 0;
      color: #333;
    }
    pre {
      background: #2d2d2d;
      color: #eee;
      padding: 10px;
      border-radius: 3px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>MPL Trace Functionality Test</h1>

  <div id="results"></div>

  <script src="formula-parser.min.js"></script>
  <script src="MPL-trace.js"></script>
  +++++++ REPLACE
  
  <script>
    function runTests() {
      const resultsDiv = document.getElementById('results');
      
      // Create a simple model for testing
      const model = new MPL.Model();
      
      // w0: P=true, Q=false, access to w1 and w2
      model.addState({P: true, Q: false});
      
      // w1: P=false, Q=true, no access
      model.addState({P: false, Q: true});
      
      // w2: P=true, Q=true, access to w1
      model.addState({P: true, Q: true});
      
      // Add accessibility
      model.addTransition(0, 1);  // w0 -> w1
      model.addTransition(0, 2);  // w0 -> w2
      model.addTransition(2, 1);  // w2 -> w1
      
      const tests = [
        { name: "Simple Proposition", formula: "P", world: 0 },
        { name: "Simple Proposition (false)", formula: "Q", world: 0 },
        { name: "Negation", formula: "~P", world: 0 },
        { name: "Conjunction", formula: "(P & Q)", world: 0 },
        { name: "Disjunction", formula: "(P | Q)", world: 0 },
        { name: "Implication (true)", formula: "(P -> Q)", world: 0 },
        { name: "Implication (false)", formula: "(Q -> P)", world: 1 },
        { name: "Equivalence", formula: "(P <-> Q)", world: 2 },
        { name: "Necessity (true - all worlds satisfy)", formula: "[]P", world: 2 },
        { name: "Necessity (false - not all worlds satisfy)", formula: "[]P", world: 0 },
        { name: "Possibility (true - some world satisfies)", formula: "<>P", world: 0 },
        { name: "Possibility (false - no world satisfies)", formula: "<>P", world: 1 },
        { name: "Complex Modal", formula: "[](P -> Q)", world: 2 },
        { name: "Nested Necessity", formula: "[][]P", world: 2 },
        { name: "Complex with Negation", formula: "~[]P", world: 0 },
        { name: "Complex Conjunction", formula: "(P & <>Q)", world: 0 },
      ];
      
      let html = '';
      
      tests.forEach(test => {
        try {
          const wff = new MPL.Wff(test.formula);
          const traceResult = MPL.truthWithTrace(model, test.world, wff);
          
          html += `<div class="test-section">
            <h2>Test: ${test.name}</h2>
            <p><strong>Formula:</strong> ${test.formula} at w${test.world}</p>
            <pre>${traceResult.trace}</pre>
          </div>`;
        } catch (error) {
          html += `<div class="test-section" style="border-color: red;">
            <h2>Test: ${test.name} - ERROR</h2>
            <p><strong>Formula:</strong> ${test.formula} at w${test.world}</p>
            <pre style="color: #ff6b6b;">Error: ${error.message}</pre>
          </div>`;
        }
      });
      
      resultsDiv.innerHTML = html;
    }
    
    // Run tests when page loads
    window.addEventListener('DOMContentLoaded', runTests);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modal Non-Entailment Worksheet</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    #layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      grid-template-rows: auto;
      height: 100vh;
    }

    aside {
      border-right: 1px solid #e5e7eb;
      background: #111827;
      color: #e5e7eb;
      padding: 1rem;
      overflow-y: auto;
    }

    aside h2 {
      margin-top: 0;
      font-size: 1.1rem;
      margin-bottom: 0.75rem;
    }

    .problem-button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.4rem 0.6rem;
      border-radius: 0.375rem;
      border: none;
      margin-bottom: 0.3rem;
      background: #1f2937;
      color: inherit;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .problem-button.active {
      background: #2563eb;
    }

    .problem-button .status {
      margin-right: 0.35rem;
    }

    main {
      padding: 1rem 1.25rem;
      overflow-y: auto;
    }

    main h1 {
      margin-top: 0;
      font-size: 1.25rem;
    }

    .constraint-list {
      font-size: 0.9rem;
      padding-left: 1.1rem;
    }

    .constraint-list li {
      margin-bottom: 0.25rem;
    }

    .check-button {
      margin-top: 0.75rem;
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      border: none;
      background: #16a34a;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .check-button:hover {
      background: #15803d;
    }

    #result {
      margin-top: 0.75rem;
      background: #111827;
      color: #e5e7eb;
      padding: 0.75rem;
      border-radius: 0.5rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
    }

    #playground-panel {
        margin-top: 1.25rem;
        background: #ffffff;
        border-radius: 0.75rem;
        border: 1px solid #e5e7eb;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }


    #playground-header {
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid #e5e7eb;
        font-size: 0.9rem;
        background: #f9fafb;
        }

    #playground-frame {
        border: none;
        width: 100%;
        height: 700px;
        border: none;
    }
  </style>
  <script src="formula-parser.min.js"></script>
  <script src="MPL-trace.js"></script>
  <script src="worksheet-common.js"></script>
</head>
<body>

<div id="layout">
  <!-- Sidebar: problem list -->
  <aside>
    <h2>Problems</h2>
    <div id="problem-list"></div>
  </aside>

  <!-- Middle: active problem -->
  <main>
    <h1 id="problem-title">Modal non-entailment worksheet</h1>
    <div id="problem-description"></div>

    <h3>Constraints to satisfy</h3>
    <ul id="constraint-list" class="constraint-list"></ul>

    <button class="check-button" onclick="worksheetApp.checkCurrentProblem()">Check current model</button>

    <div id="result"></div>

    <section id="playground-panel">
      <div id="playground-header">
        Build a Kripke model that makes the premise true at w₀ and the conclusion false,
        showing the sequent is invalid in K. Then click “Check current model”.
      </div>
      <iframe
        id="playground-frame"
        src="modallogic/index.html"
        title="Modal Logic Playground"
      ></iframe>
      <div style="
  text-align: right;
  font-size: 0.75rem;
  color: #6b7280;
  padding: 0.35rem 0.75rem 0.45rem;
  border-top: 1px solid #e5e7eb;
">
  Model editor based on
  <a href="https://github.com/rkirsling/modallogic" target="_blank"
     style="color: #2563eb; text-decoration: none;">
    Ross Kirsling’s Modal Logic Playground
  </a>.
</div>
    </section>
  </main>


</div>

<script>
  // --- Problem definitions ---------------------------------------------------

  // Each problem records the premise that must be true at w0 and the
  // conclusion that must be false at w0 to witness non-entailment.
  const problems = [
      { 
        id: 1,
        title: "1. □(P ∨ Q) ⊭ □P",
        description: `Show a model where □(P ∨ Q) is true at w₀ but □P is false.`,
        constraints: [
          { type: "truth", world: 0, formula: "[](P | Q)", expected: true },
          { type: "truth", world: 0, formula: "[]P", expected: false }
        ],
        modelString: null,
        solved: false
      },
    {
      id: 2,
      title: "2. □¬(P ∧ Q) ⊭ (□¬P ∨ □¬Q)",
      description: `Make □¬(P ∧ Q) true at w₀ while (□¬P ∨ □¬Q) is false at w₀.`,
      constraints: [
        { type: "truth", world: 0, formula: "[]~(P & Q)", expected: true },
        { type: "truth", world: 0, formula: "([]~P | []~Q)", expected: false }
      ],
      modelString: null,
      solved: false
    },
      {
        id: 3,
        title: "3. □P ⊭ P",
        description: `Find a world w₀ where □P holds but P itself is false.`,
        constraints: [
          { type: "truth", world: 0, formula: "[]P", expected: true },
          { type: "truth", world: 0, formula: "P", expected: false }
        ],
        modelString: null,
        solved: false
      },
      {
        id: 4,
        title: "4. P ⊭ ◇P",
        description: `Make P true at w₀ while ◇P fails at w₀.`,
        constraints: [
          { type: "truth", world: 0, formula: "P", expected: true },
          { type: "truth", world: 0, formula: "<>P", expected: false }
        ],
        modelString: null,
        solved: false
      },
      {
        id: 5,
        title: "5. □Q ⊭ □□Q",
        description: `Ensure □Q is true at w₀ but □□Q is false at w₀.`,
        constraints: [
          { type: "truth", world: 0, formula: "[]Q", expected: true },
          { type: "truth", world: 0, formula: "[][]Q", expected: false }
        ],
        modelString: null,
        solved: false
      },
      {
        id: 6,
        title: "6. ◇Q ⊭ □◇Q",
        description: `Build a model where ◇Q holds at w₀ but □◇Q does not.`,
        constraints: [
          { type: "truth", world: 0, formula: "<>Q", expected: true },
          { type: "truth", world: 0, formula: "[]<>Q", expected: false }
        ],
        modelString: null,
        solved: false
      }
  ];

  window.worksheetApp = createWorksheetApp({
    problems,
    useTrace: true,
    traceMPL: MPL,
    worldOffset: 0,
    playgroundSrc: "modallogic/index.html"
  });

  window.addEventListener("load", () => {
    worksheetApp.init();
  });
</script>

</body>
</html>

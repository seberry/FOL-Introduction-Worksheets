<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modal Logic Worksheet</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    #layout {
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr);
  grid-template-rows: auto;
  height: 100vh;
    }

    aside {
      border-right: 1px solid #e5e7eb;
      background: #111827;
      color: #e5e7eb;
      padding: 1rem;
      overflow-y: auto;
    }

    aside h2 {
      margin-top: 0;
      font-size: 1.1rem;
      margin-bottom: 0.75rem;
    }

    .problem-button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.4rem 0.6rem;
      border-radius: 0.375rem;
      border: none;
      margin-bottom: 0.3rem;
      background: #1f2937;
      color: inherit;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .problem-button.active {
      background: #2563eb;
    }

    .problem-button .status {
      margin-right: 0.35rem;
    }

    main {
      padding: 1rem 1.25rem;
      overflow-y: auto;
    }

    main h1 {
      margin-top: 0;
      font-size: 1.25rem;
    }

    .constraint-list {
      font-size: 0.9rem;
      padding-left: 1.1rem;
    }

    .constraint-list li {
      margin-bottom: 0.25rem;
    }

    .check-button {
      margin-top: 0.75rem;
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      border: none;
      background: #16a34a;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .check-button:hover {
      background: #15803d;
    }

    #result {
      margin-top: 0.75rem;
      background: #111827;
      color: #e5e7eb;
      padding: 0.75rem;
      border-radius: 0.5rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
    }

    #result:empty {
  display: none;
}

    #playground-panel {
        margin-top: 1.25rem;
        background: #ffffff;
        border-radius: 0.75rem;
        border: 1px solid #e5e7eb;
        display: flex;
        flex-direction: column;
        overflow: hidden; 
    }


    #playground-header {
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid #e5e7eb;
        font-size: 0.9rem;
        background: #f9fafb;
        }

    #playground-frame {
        border: none;
        width: 100%;
        height: 700px;
        border: none;
    }
  </style>
  <script src="worksheet-common.js"></script>
</head>
<body>

<div id="layout">
  <!-- Sidebar: problem list -->
  <aside>
    <h2>Problems</h2>
    <div id="problem-list"></div>
  </aside>

  <!-- Middle: active problem -->
  <main>
    <h1 id="problem-title">Modal logic worksheet</h1>
    <div id="problem-description"></div>

    <h3>Constraints to satisfy</h3>
    <ul id="constraint-list" class="constraint-list"></ul>

    <button class="check-button" onclick="worksheetApp.checkCurrentProblem()">Check current model</button>

    <div id="result"></div>

          <div id="playground-header">
        Use the editor below to build a model for the active problem.
        Then click "Check current model".
      </div>
        <strong>Note: This model editor is a tiny modification of</strong> 
  <a href="https://github.com/rkirsling/modallogic" target="_blank" 
     style="color: #2563eb; text-decoration: underline; font-weight: 600;">
    Ross Kirsling's Modal Logic Playground
  </a>


    <section id="playground-panel">


      <iframe
        id="playground-frame"
        src="modallogic/index.html"
        title="Modal Logic Playground"
      ></iframe>
      <div style="
  text-align: right;
  font-size: 0.85rem;
  color: #374151;
  padding: 0.6rem 0.85rem 0.75rem;
  border-top: 1px solid #e5e7eb;
  background: #f9fafb;
">

</div>
    </section>
  </main>


</div>

<script>
  // --- Problem definitions ---------------------------------------------------

  // Constraint types:
  //  { type: 'truth',   world: 0, formula: '[]p', expected: true }
  //  { type: 'truth',   world: 0, formula: '<>q', expected: false }
  //  { type: 'different', world: 0, formulaA: '[]p', formulaB: '[]q' }

  const problems = [
  // ------------------------------------------------------------
  // CW: Show satisfiable (formula true at w@ = w0)
  // ------------------------------------------------------------

  {
    id: 1,
    title: "CW1. Make (P ∧ Q) true at w₀",
    description: `
Show that the sentence (P ∧ Q) is modally satisfiable by
creating a model in which it is true at w₀.`,
    constraints: [
      { type: "truth", world: 0, formula: "(P & Q)", expected: true }
    ],
    modelString: null,
    solved: false
  },

  {
    id: 2,
    title: "CW2. Make (P ∧ ¬□P) true at w₀",
    description: `
Show modally satisfiable: P ∧ ¬□P is true at w₀.`,
    constraints: [
      { type: "truth", world: 0, formula: "(P & ~[]P)", expected: true }
    ],
    modelString: null,
    solved: false
  },

  {
    id: 3,
    title: "CW3. Make (◇P ∧ ◇¬P) true at w₀",
    description: `
Show modally satisfiable: ◇P ∧ ◇¬P is true at w₀.`,
    constraints: [
      { type: "truth", world: 0, formula: "(<>P & <>~P)", expected: true }
    ],
    modelString: null,
    solved: false
  },

  {
    id: 4,
    title: "CW4. Make (P → Q) true at w₀",
    description: `
Show modally satisfiable: (P → Q) is true at w₀.`,
    constraints: [
      { type: "truth", world: 0, formula: "(P -> Q)", expected: true }
    ],
    modelString: null,
    solved: false
  },

  {
    id: 5,
    title: "CW5. Make □(P → Q) true at w₀",
    description: `
Show modally satisfiable: □(P → Q) is true at w₀.`,
    constraints: [
      { type: "truth", world: 0, formula: "[] (P -> Q)", expected: true }
    ],
    modelString: null,
    solved: false
  },

  {
    id: 6,
    title: "CW6. Make (P ∧ ◇¬P) true at w₀",
    description: `
Show modally satisfiable: (P ∧ ◇¬P) is true at w₀.`,
    constraints: [
      { type: "truth", world: 0, formula: "(P & <>~P)", expected: true }
    ],
    modelString: null,
    solved: false
  },

  {
    id: 7,
    title: "CW7. Make (□(P→Q) ∧ □(P→¬Q)) true at w₀",
    description: `
Show modally satisfiable: □(P→Q) ∧ □(P→¬Q) is true at w₀.`,
    constraints: [
      { type: "truth", world: 0, formula: "([](P->Q) & [](P->~Q))", expected: true }
    ],
    modelString: null,
    solved: false
  },

  // ------------------------------------------------------------
  // Participation Q: show non-equivalence (different truth values)
  // ------------------------------------------------------------

  {
    id: 8,
    title: "NE1. P vs □P",
    description: `
Create a model where P is true at w₀ and □P is false
(or vice-versa), showing they are not equivalent.`,
    constraints: [
      { type: "different", world: 0, formulaA: "P", formulaB: "[]P" }
    ],
    modelString: null,
    solved: false
  },

  {
    id: 9,
    title: "NE2. (P ∧ □Q) vs □(P ∧ Q)",
    description: `
Create a model where (P ∧ □Q) and □(P ∧ Q) differ in truth at w₀.`,
    constraints: [
      { type: "different", world: 0, formulaA: "(P & []Q)", formulaB: "[](P & Q)" }
    ],
    modelString: null,
    solved: false
  },

  {
    id: 10,
    title: "NE3. (P→Q) vs □(P→Q)",
    description: `
Create a model where (P→Q) and □(P→Q) differ at w₀.`,
    constraints: [
      { type: "different", world: 0, formulaA: "(P->Q)", formulaB: "[](P->Q)" }
    ],
    modelString: null,
    solved: false
  },

  {
    id: 11,
    title: "NE4. (P→□Q) vs ◇¬Q",
    description: `
Create a model where (P→□Q) and ◇¬Q differ at w₀.`,
    constraints: [
      { type: "different", world: 0, formulaA: "(P->[]Q)", formulaB: "<>~Q" }
    ],
    modelString: null,
    solved: false
  },

  // ------------------------------------------------------------
  // Participation Q: falsify principles
  // ------------------------------------------------------------

  {
    id: 12,
    title: "PR1. Falsify □φ → □□φ at w₀",
    description: `
Create a Kripke model where □φ → □□φ is false at w₀.  
(i.e. □φ is true at w₀ but □□φ is false at w₀.)`,
    constraints: [
      { type: "truth", world: 0, formula: "( []P -> [][]P )", expected: false }
      // You can replace P with any variable — MPL doesn't care.
    ],
    modelString: null,
    solved: false
  },

  {
    id: 13,
    title: "PR2. Falsify ◇□φ → □φ at w₀",
    description: `
Create a Kripke model where ◇□φ → □φ is false at w₀.  
(i.e. ◇□φ holds at w₀ but □φ does not.)`,
    constraints: [
      { type: "truth", world: 0, formula: "( <>[]P -> []P )", expected: false }
    ],
    modelString: null,
    solved: false
  }
];

  window.worksheetApp = createWorksheetApp({
    problems,
    useTrace: true,
    worldOffset: 0,
    playgroundSrc: "modallogic/index.html"
  });

  window.addEventListener("load", () => {
    worksheetApp.init();
  });
</script>

</body>


</html>
